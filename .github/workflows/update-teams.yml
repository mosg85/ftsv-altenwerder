# Workflow: Automatisches Aktualisieren von teams.json bei Änderungen an Mannschaften
name: Mannschaften-Index aktualisieren

on:
  push:
    branches:
      - main
    # Nur ausführen, wenn Änderungen im teams-Ordner vorliegen
    paths:
      - 'content/teams/*.md'
  # Ermöglicht manuelles Auslösen über die GitHub-Oberfläche
  workflow_dispatch:

permissions:
  contents: write  # Erlaubnis, Änderungen zu committen

jobs:
  generate-teams-json:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Wir brauchen die komplette History, um Änderungen zu prüfen

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install pyyaml

      - name: Generiere teams.json
        run: python generate_teams_json.py

      - name: Prüfe ob teams.json geändert wurde
        id: check
        run: |
          if git diff --quiet content/teams/teams.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Änderungen committen und pushen
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/teams/teams.json
          git commit -m "teams.json nach Aktualisierung der Mannschaften automatisch generiert"
          git push

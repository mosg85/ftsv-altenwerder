<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mannschaft - FTSV Altenwerder</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .team-detail-header {
            margin-top: 0;
            background: linear-gradient(135deg, var(--primary) 0%, #0f2a40 100%);
            padding: 3rem 0;
            text-align: center;
            border-bottom: 3px solid var(--secondary);
        }
        .team-detail-header h1 {
            font-size: 3.5rem;
            color: var(--secondary);
            text-shadow: 0 0 20px rgba(255,49,49,0.5);
        }
        .team-detail-content {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2.5rem;
            background: rgba(10, 25, 40, 0.7);
            border-radius: 15px;
            color: #f0f0f0;
            line-height: 1.9;
            font-size: 1.2rem;
            border-left: 4px solid var(--secondary);
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .team-detail-content p {
            margin-bottom: 1.2rem;
        }
        .team-detail-content strong {
            color: var(--secondary);
        }
        .team-detail-content h2, 
        .team-detail-content h3 {
            color: var(--secondary);
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .team-detail-content ul, 
        .team-detail-content ol {
            padding-left: 1.5rem;
            margin-bottom: 1.2rem;
        }
        .team-detail-content li {
            margin-bottom: 0.5rem;
        }
        .team-detail-content a {
            color: var(--secondary);
            text-decoration: underline;
        }
        .team-detail-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 15px;
            margin: 2rem 0;
            border: 4px solid var(--secondary);
            box-shadow: 0 0 30px rgba(255,49,49,0.3);
        }
        .player-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .player-list li {
            background: rgba(255,49,49,0.1);
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            border-left: 4px solid var(--secondary);
            font-size: 1.1rem;
            color: var(--accent);
        }
        .player-list li strong {
            color: var(--secondary);
            margin-right: 0.5rem;
        }
        .back-button {
            display: inline-block;
            margin: 2rem 0;
            padding: 0.8rem 2rem;
            background: transparent;
            color: var(--secondary);
            border: 2px solid var(--secondary);
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-button:hover {
            background: var(--secondary);
            color: var(--primary);
        }
        .loading {
            text-align: center;
            font-size: 1.5rem;
            color: var(--secondary);
            padding: 4rem 0;
        }
    </style>
</head>
<body>
    <!-- COOKIE-BANNER -->
    <div id="cookie-banner" class="cookie-banner">
        <div class="cookie-content">
            <p>🍪 Diese Website verwendet technisch notwendige Cookies.</p>
            <div class="cookie-buttons">
                <button id="cookie-accept-all" class="cookie-btn cookie-btn-primary">Alle akzeptieren</button>
                <button id="cookie-accept-essential" class="cookie-btn cookie-btn-secondary">Nur notwendige</button>
            </div>
        </div>
    </div>

    <!-- BANNER UND NAVIGATION -->
    <div class="banner-header">
        <img src="images/header-banner.png" alt="FTSV Altenwerder Banner" class="banner-image">
        <nav class="banner-nav">
            <div class="container nav-container">
                <ul class="nav-menu" id="nav-menu">
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#about">Über uns</a></li>
                    <li><a href="teams.html">Mannschaften</a></li>
                    <li><a href="index.html#schedule">Spiele</a></li>
                    <li><a href="index.html#referee">Schiedsrichter</a></li>
                    <li><a href="index.html#contact">Kontakt</a></li>
                </ul>
                <div class="hamburger" id="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </div>
        </nav>
    </div>

    <!-- DYNAMISCHER INHALT -->
    <div class="team-detail-header">
        <div class="container">
            <h1 id="team-title">Lade Mannschaft...</h1>
        </div>
    </div>

    <section class="team">
        <div class="container">
            <div id="team-content" class="loading">
                Lade Daten...
            </div>
            <div style="text-align: center;">
                <a href="teams.html" class="back-button">← Zurück zur Übersicht</a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <div class="container">
            <p>© 2025 FTSV Altenwerder e.V. | 🌐 Gehostet auf GitHub Inc., USA</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            if (!slug) {
                document.getElementById('team-title').textContent = 'Keine Mannschaft ausgewählt';
                document.getElementById('team-content').innerHTML = '<p style="color: red;">Bitte wähle eine Mannschaft aus der Übersicht.</p>';
                return;
            }

            // Hier wird der RAW-Link von GitHub verwendet (funktioniert garantiert!)
            fetch(`https://raw.githubusercontent.com/mosg85/ftsv-altenwerder/main/content/teams/${slug}.md`)
                .then(response => {
                    if (!response.ok) throw new Error('Mannschaft nicht gefunden');
                    return response.text();
                })
                .then(markdown => {
                    const parts = markdown.split('---');
                    if (parts.length < 3) throw new Error('Ungültiges Dateiformat');
                    const yamlStr = parts[1];
                    const content = parts.slice(2).join('---').trim();

                    // Robuster YAML-Parser (mehrzeilige Werte)
                    const lines = yamlStr.split('\n');
                    const data = {};
                    let currentKey = null;
                    let currentValue = '';

                    lines.forEach(line => {
                        const match = line.match(/^\s*([^:]+):\s*(.*?)\s*$/);
                        if (match) {
                            if (currentKey) data[currentKey] = currentValue.trim();
                            currentKey = match[1];
                            currentValue = match[2];
                        } else if (currentKey && line.startsWith(' ')) {
                            currentValue += ' ' + line.trim();
                        }
                    });
                    if (currentKey) data[currentKey] = currentValue.trim();

                    document.getElementById('team-title').textContent = data.title || slug;

                    // Bild-Auswahl (feste Testbilder für 1d/2d)
                    let imgUrl;
                    if (slug === '1d') {
                        imgUrl = 'https://picsum.photos/id/1043/1200/600'; // Fußball-Stadion
                    } else if (slug === '2d') {
                        imgUrl = 'https://picsum.photos/id/164/1200/600'; // Landschaft
                    } else {
                        if (data.image && data.image !== '#' && data.image !== '') {
                            imgUrl = data.image;
                        } else {
                            imgUrl = `https://via.placeholder.com/1200x600/1e3c5c/ffffff?text=${encodeURIComponent(data.title || slug)}`;
                        }
                    }

                    // Beschreibung (entweder aus Inhalt oder description-Feld)
                    let htmlContent = '';
                    if (content !== '') {
                        htmlContent = marked.parse(content);
                    } else if (data.description) {
                        htmlContent = `<p>${data.description}</p>`;
                    }

                    // Spieler-Liste
                    let playersHtml = '';
                    if (data.players && Array.isArray(data.players)) {
                        playersHtml = '<h3 style="color: var(--secondary); margin: 2rem 0 1rem;">Kader</h3><ul class="player-list">';
                        data.players.forEach(player => {
                            playersHtml += `<li><strong>${player.number || ''}</strong> ${player.name || ''} ${player.position ? '('+player.position+')' : ''}</li>`;
                        });
                        playersHtml += '</ul>';
                    }

                    document.getElementById('team-content').innerHTML = `
                        <img src="${imgUrl}" alt="${data.title}" class="team-detail-image">
                        <div class="team-detail-content">
                            ${htmlContent}
                        </div>
                        ${playersHtml}
                    `;
                })
                .catch(error => {
                    document.getElementById('team-title').textContent = 'Fehler';
                    document.getElementById('team-content').innerHTML = `<p style="color: red;">${error.message}</p>`;
                    console.error(error);
                });
        });
    </script>
</body>
</html>
